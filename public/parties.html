<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL Matching - パーティー一覧</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="parties.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="auth.js"></script>
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-container">
            <a href="/" class="nav-logo">LoL Matching</a>
            <div class="nav-menu">
                <a href="/" class="nav-link">ホーム</a>
                <a href="/profile" class="nav-link auth-required disabled-link" data-tooltip="ログインが必要です">プロフィール</a>
                <a href="/matching" class="nav-link auth-required disabled-link" data-tooltip="ログインが必要です">募集</a>
                <a href="/posts" class="nav-link auth-required disabled-link" data-tooltip="ログインが必要です">投稿</a>
                <a href="/requests" class="nav-link auth-required disabled-link" data-tooltip="ログインが必要です">申請</a>
                <a href="/parties" class="nav-link auth-required disabled-link active" data-tooltip="ログインが必要です">パーティー</a>
            </div>
            <div class="user-profile">
                <div id="navProfileImage" class="profile-image"></div>
                <span id="navDisplayName"></span>
                <button id="navLogoutBtn" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> ログアウト
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <main class="main-content">
            <div class="page-header">
                <h1>パーティー一覧</h1>
                <p>参加しているパーティーを管理できます</p>
            </div>

            <div id="partiesContainer" class="parties-container">
                <!-- パーティー一覧がここに動的に追加されます -->
            </div>

            <div id="noPartiesMessage" class="no-parties-message" style="display: none;">
                <p>現在参加しているパーティーはありません。</p>
                <a href="/matching" class="find-party-btn">パーティーを探す</a>
            </div>
        </main>
    </div>

    <script src="nav.js"></script>
    <script src="parties.js"></script>
</body>
</html>
