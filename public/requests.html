<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL Matching - 申請管理</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-container">
            <a href="/" class="nav-logo">LoL Matching</a>
            <div class="nav-menu">
                <a href="/" class="nav-link">ホーム</a>
                <a href="/profile" class="nav-link auth-required disabled-link" data-tooltip="ログインが必要です">プロフィール</a>
                <a href="/matching" class="nav-link auth-required disabled-link" data-tooltip="ログインが必要です">募集</a>
                <a href="/posts" class="nav-link auth-required disabled-link" data-tooltip="ログインが必要です">投稿</a>
                <a href="/requests" class="nav-link auth-required disabled-link active" data-tooltip="ログインが必要です">申請</a>
                <a href="/parties" class="nav-link auth-required disabled-link" data-tooltip="ログインが必要です">パーティー</a>
            </div>
            <div class="user-profile">
                <div id="navProfileImage" class="profile-image"></div>
                <span id="navDisplayName"></span>
                <button id="navLogoutBtn" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> ログアウト
                </button>
            </div>
        </div>
    </nav>

    <div class="container">
        <main class="main-content">
            <section class="requests-section">
                <div class="section-header">
                    <h2 class="section-title">申請管理</h2>
                </div>

                <div class="requests-tabs">
                    <button class="tab-btn active" data-tab="received">受け取った申請</button>
                    <button class="tab-btn" data-tab="sent">送信した申請</button>
                </div>

                <div id="receivedRequests" class="requests-list active">
                    <!-- 受け取った申請はJavaScriptで動的に追加 -->
                </div>

                <div id="sentRequests" class="requests-list">
                    <!-- 送信した申請はJavaScriptで動的に追加 -->
                </div>
            </section>
        </main>
    </div>

    <script src="nav.js"></script>
    <script src="auth.js"></script>
    <script src="requests.js"></script>
</body>
</html>
